<html>
<head>
    <title>Student Marks Prediction</title>
</head>
<body>

<h1>Student Final Marks Prediction</h1>

<form id="form">
    <input type="number" id="attendance" placeholder="Attendance" required><br><br>
    <input type="number" id="test" placeholder="Test Marks" required><br><br>
    <input type="number" id="assignment" placeholder="Assignment Marks" required><br><br>

    <button type="submit">Predict</button>
</form>

<h2 id="result"></h2>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const response = await fetch("http://localhost:3000/student-result", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            Attendance: Number(document.getElementById("attendance").value),
            Test_Marks: Number(document.getElementById("test").value),
            Assignment_Marks: Number(document.getElementById("assignment").value)
        })
    });

    const data = await response.json();

    document.getElementById("result").innerText =
        "Predicted Marks: " + data.predicted_marks;
});
</script>

</body>
</html>
